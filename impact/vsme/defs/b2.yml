indicators:
  - title: Premier indicateur
    fields:
    - name: denomination
      label: Nom juridique
      type: text
      required: true
      max_length: 100
    - name: email
      label: Adresse email
      type: email
      required: true
    - name: bilan
      label: Bilan net
      type: number
      min: 1
      max: 10000000
    - name: filiale
      label: l'entreprise a plusieurs filiales
      type: boolean
      required: false
  - title: Second indicateur
    fields:
    - name: liste_filiales
      label: Filiales et leurs CA respectifs
      type: table
      required: false
      columns:
      - name: denomination_filiale
        label: Nom juridique
        type: text
        required: true
      - name: CA
        label: Chiffre d'affaires
        type: number
